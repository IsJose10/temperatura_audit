<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#006B28">
    <meta name="description" content="RANSA - Sistema de Auditoría de Temperatura">
    <title>{% block title %}RANSA - Auditoría de Temperatura{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        ransa: {
                            50: '#e6f7ed',
                            100: '#c0ebd2',
                            200: '#8fd9ae',
                            300: '#5cc889',
                            400: '#33b96c',
                            500: '#009B3A',
                            600: '#008a33',
                            700: '#00762b',
                            800: '#006224',
                            900: '#004A1B',
                            950: '#003312',
                        },
                        'ransa-orange': {
                            400: '#f9b54d',
                            500: '#F7941D',
                            600: '#e07f0e',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/styles.css">
    <link rel="icon" type="image/png" href="/static/img/ransa_icon_original.jpg">
    {% block extra_head %}{% endblock %}
</head>
<body class="font-sans antialiased bg-gray-50 text-gray-900">
    <div id="toast" class="toast"></div>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="flex flex-col items-center gap-3">
            <div class="spinner"></div>
            <span class="text-sm text-gray-500 font-medium">Cargando...</span>
        </div>
    </div>
    {% block body %}{% endblock %}
    <script src="/static/js/app.js"></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
