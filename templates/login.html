{% extends "base.html" %}
{% block title %}RANSA - Iniciar Sesión{% endblock %}

{% block body %}
<div class="app-container">
    <div class="login-container">
        <div class="login-header" style="flex-direction:column;align-items:center;gap:8px;">
            <img src="/static/img/ransa_logo.svg" alt="RANSA" style="height:48px;margin-bottom:8px;">
            TOMA DE TEMPERATURA
        </div>

        <form class="login-form" id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-label">Usuario</div>
            <div class="input-group">
                <span class="input-icon">👤</span>
                <input type="text" id="username" placeholder="Usuario" required autocomplete="username">
            </div>

            <div class="form-label">Contraseña</div>
            <div class="input-group">
                <span class="input-icon">🔒</span>
                <input type="password" id="password" placeholder="Contraseña" required autocomplete="current-password">
            </div>

            <button type="submit" class="btn-login" id="btnLogin">
                Ingresar
            </button>
        </form>

        <div class="login-logo">
            <img src="/static/img/ransa_logo.svg" alt="RANSA" style="height:36px;opacity:0.7;">
        </div>
    </div>
</div>

{% endblock %}

{% block extra_scripts %}
<script>
async function handleLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('btnLogin');
    const form = document.getElementById('loginForm');
    
    btn.disabled = true;
    btn.textContent = 'Ingresando...';
    
    try {
        const response = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                username: document.getElementById('username').value,
                password: document.getElementById('password').value
            })
        });
        
        if (!response.ok) {
            const err = await response.json();
            throw new Error(err.detail || 'Error de autenticación');
        }
        
        const data = await response.json();
        localStorage.setItem('token', data.access_token);
        localStorage.setItem('user', JSON.stringify(data.user));
        
        showToast('¡Bienvenido, ' + data.user.nombre_completo + '!', 'success');
        
        setTimeout(() => {
            window.location.href = '/auditoria';
        }, 500);
    } catch (error) {
        showToast(error.message, 'error');
        form.classList.add('shake');
        setTimeout(() => form.classList.remove('shake'), 500);
        btn.disabled = false;
        btn.textContent = 'Ingresar';
    }
}
</script>
{% endblock %}
